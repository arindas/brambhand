name: Coverage

permissions:
  contents: write

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/coverage.yml"
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/coverage.yml"

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        run: uv run pytest --cov=src/brambhand --cov-report=term-missing --cov-report=xml

      - name: Build coverage badge endpoint JSON
        run: |
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          tree = ET.parse("coverage.xml")
          root = tree.getroot()
          rate = float(root.attrib.get("line-rate", "0"))
          pct = int(round(rate * 100))

          if pct >= 90:
              color = "4c1"
          elif pct >= 80:
              color = "97CA00"
          elif pct >= 70:
              color = "dfb317"
          elif pct >= 60:
              color = "fe7d37"
          else:
              color = "e05d44"

          Path("badges").mkdir(exist_ok=True)
          endpoint_json = (
              '{"schemaVersion":1,'
              '"label":"coverage",'
              f'"message":"{pct}%",'
              f'"color":"{color}"'
              '}'
          )
          Path("badges/coverage.json").write_text(endpoint_json, encoding="utf-8")

          summary = Path("summary.md")
          summary.write_text(f"### Coverage\n\n- Line coverage: **{pct}%**\n", encoding="utf-8")
          PY

      - name: Publish coverage summary
        run: cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: |
            coverage.xml
            badges/coverage.json

      - name: Commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- badges/coverage.json; then
            echo "No coverage badge changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.json
          git commit -m "ci: update coverage badge [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
