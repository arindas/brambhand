name: Coverage

permissions:
  contents: write

on:
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/coverage.yml"
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/coverage.yml"

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        run: uv run pytest --cov=src/brambhand --cov-report=term-missing --cov-report=xml

      - name: Build coverage badge SVG
        run: |
          python - <<'PY'
          from pathlib import Path
          import xml.etree.ElementTree as ET

          tree = ET.parse("coverage.xml")
          root = tree.getroot()
          rate = float(root.attrib.get("line-rate", "0"))
          pct = int(round(rate * 100))

          if pct >= 90:
              color = "#4c1"
          elif pct >= 80:
              color = "#97CA00"
          elif pct >= 70:
              color = "#dfb317"
          elif pct >= 60:
              color = "#fe7d37"
          else:
              color = "#e05d44"

          label = "coverage"
          value = f"{pct}%"
          label_w = 74
          value_w = max(48, 9 * len(value) + 16)
          total_w = label_w + value_w

          svg = f'''<svg xmlns="http://www.w3.org/2000/svg" width="{total_w}" height="20" role="img" aria-label="{label}: {value}">
          <linearGradient id="s" x2="0" y2="100%">
            <stop offset="0" stop-color="#fff" stop-opacity=".7"/>
            <stop offset=".1" stop-color="#aaa" stop-opacity=".1"/>
            <stop offset=".9" stop-opacity=".3"/>
            <stop offset="1" stop-opacity=".5"/>
          </linearGradient>
          <clipPath id="r"><rect width="{total_w}" height="20" rx="3" fill="#fff"/></clipPath>
          <g clip-path="url(#r)">
            <rect width="{label_w}" height="20" fill="#555"/>
            <rect x="{label_w}" width="{value_w}" height="20" fill="{color}"/>
            <rect width="{total_w}" height="20" fill="url(#s)"/>
          </g>
          <g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" font-size="11">
            <text x="{label_w/2}" y="15" fill="#010101" fill-opacity=".3">{label}</text>
            <text x="{label_w/2}" y="14">{label}</text>
            <text x="{label_w + value_w/2}" y="15" fill="#010101" fill-opacity=".3">{value}</text>
            <text x="{label_w + value_w/2}" y="14">{value}</text>
          </g>
          </svg>'''

          Path("badges").mkdir(exist_ok=True)
          Path("badges/coverage.svg").write_text(svg, encoding="utf-8")

          print(f"Coverage: {pct}%")

          summary = Path("summary.md")
          summary.write_text(f"### Coverage\n\n- Line coverage: **{pct}%**\n", encoding="utf-8")
          PY

      - name: Publish coverage summary
        run: cat summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-artifacts
          path: |
            coverage.xml
            badges/coverage.svg

      - name: Commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if git diff --quiet -- badges/coverage.svg; then
            echo "No coverage badge changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.svg
          git commit -m "ci: update coverage badge [skip ci]"
          git push origin HEAD:${GITHUB_REF_NAME}
