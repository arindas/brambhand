name: CI

on:
  pull_request:
    paths:
      - "python/brambhand/src/**"
      - "python/brambhand/tests/**"
      - "python/brambhand/pyproject.toml"
      - "python/brambhand/uv.lock"
      - "c/brambhand/**"
      - "interfaces/runtime_bridge.proto"
      - ".github/workflows/ci.yml"
  push:
    branches: [main, master]
    paths:
      - "python/brambhand/src/**"
      - "python/brambhand/tests/**"
      - "python/brambhand/pyproject.toml"
      - "python/brambhand/uv.lock"
      - "c/brambhand/**"
      - "interfaces/runtime_bridge.proto"
      - ".github/workflows/ci.yml"

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync dependencies
        working-directory: python/brambhand
        run: uv sync --extra dev

      - name: Ruff
        working-directory: python/brambhand
        run: uv run ruff check .

      - name: Mypy
        working-directory: python/brambhand
        run: uv run mypy src tests

      - name: Pytest
        working-directory: python/brambhand
        run: uv run pytest

  cpp-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure CMake
        run: cmake -S c/brambhand -B c/brambhand/build

      - name: Build C++ targets
        run: cmake --build c/brambhand/build --config Release -j2

      - name: Run C++ tests
        run: ctest --test-dir c/brambhand/build --output-on-failure
